---
- name: Install EPEL and Nginx
  ansible.builtin.dnf:
    name:
      - epel-release
      - nginx
    state: present
  tags:
    - packages
    - nginx

- name: Create nginx directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /var/log/nginx
    - /run
  tags:
    - config

- name: Deploy custom index.html from template
  ansible.builtin.template:
    src: index.html.j2
    dest: /usr/share/nginx/html/index.html
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx
  tags:
    - config

- name: Start nginx manually
  ansible.builtin.command: nginx
  args:
    creates: /run/nginx.pid
  tags:
    - service

- name: Gather nginx version
  ansible.builtin.shell: nginx -v 2>&1 | awk -F '/' '{print $2}'
  register: nginx_version_raw
  changed_when: false
  check_mode: false
  tags:
    - verify

- name: Gather nginx log paths
  ansible.builtin.shell: grep -E "access_log|error_log" /etc/nginx/nginx.conf | grep -v '#' | head -2
  register: nginx_logs_raw
  changed_when: false
  check_mode: false
  tags:
    - verify

- name: Set facts for final summary
  ansible.builtin.set_fact:
    nginx_version: "{{ nginx_version_raw.stdout | trim }}"
    nginx_logs: "{{ nginx_logs_raw.stdout_lines | join('; ') }}"
  tags:
    - verify
